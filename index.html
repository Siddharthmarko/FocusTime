<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --paper: #f5f0e8;
  --cream: #ede8dc;
  --gold: #b8955a;
  --muted: #7a7060;
  --rule: #d8d0c0;
  --card-bg: #f0ebe0;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: var(--paper);
}

body {
  background:
    radial-gradient(ellipse at 70% 20%, rgba(184,149,90,.08), transparent 45%),
    radial-gradient(ellipse at 10% 80%, rgba(184,149,90,.05), transparent 40%),
    var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

.grain {
  position:fixed; inset:0; pointer-events:none; z-index:100; opacity:.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── LAYOUT: landscape = side by side, portrait = stacked ── */
.layout {
  width: 100%;
  height: 100dvh;
  display: grid;
}

/* LANDSCAPE */
@media (orientation: landscape) {
  .layout {
    grid-template-columns: 1fr 300px;
    grid-template-rows: 1fr;
    overflow: hidden;
  }
  .stage {
    border-right: 1px solid var(--rule);
    border-bottom: none;
    padding: 5vh 4vw 5vh 6vw;
    min-height: unset;
  }
  .panel {
    overflow-y: auto;
  }
  .label-top { top: 32px; left: 6vw; }
  .edit-hint  { bottom: 28px; left: 6vw; }
  .open-mark  { font-size: clamp(100px, 14vw, 200px); }
  .quote-text { font-size: clamp(2rem, 3.6vw, 5rem); }
  .timer-block { flex: 1; padding: 20px 0; }
  .timer-display { font-size: clamp(2.4rem, 4vw, 3.6rem); }
}

/* PORTRAIT */
@media (orientation: portrait) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }
  .stage {
    border-right: none;
    border-bottom: 1px solid var(--rule);
    padding: 10vw 8vw 8vw;
    min-height: 0;
    justify-content: center;
  }
  .panel {
    overflow-y: auto;
    max-height: 52vh;
  }
  .label-top { top: 5vw; left: 8vw; }
  .edit-hint  { bottom: 5vw; left: 8vw; }
  .open-mark  { font-size: clamp(90px, 22vw, 160px); left: 6vw; }
  .quote-text { font-size: clamp(1.8rem, 6vw, 3.8rem); }
  .timer-block { flex: none; padding: 16px 0; border-bottom: 1px solid var(--rule); }
  .timer-display { font-size: clamp(2.6rem, 9vw, 4rem); }
  .panel { flex-direction: column; gap: 14px; padding: 20px 24px; }
  .panel-top { padding-bottom: 14px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .quote-btn { margin-top: 0; }
}

/* ── STAGE (quote side) ── */
.stage {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}

.stage::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .5;
}

.label-top {
  position: absolute;
  font-size: 10px;
  letter-spacing: .25em;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
}

.open-mark {
  font-family: 'Playfair Display', serif;
  line-height: .75;
  color: var(--cream);
  position: absolute;
  top: 50%;
  left: 5.5vw;
  transform: translateY(-68%);
  user-select: none;
  pointer-events: none;
}

/* portrait: reposition the open-mark relative to quote area */
@media (orientation: portrait) {
  .open-mark {
    top: 38%;
  }
}

.quote-wrap {
  position: relative;
  z-index: 2;
}

.quote-text {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  line-height: 1.08;
  color: var(--ink);
  max-width: 820px;
  outline: none;
  caret-color: var(--gold);
}

.quote-text:focus { outline: none; }
.quote-text::selection { background: rgba(184,149,90,.2); }

.divider {
  width: 48px; height: 1px;
  background: var(--gold);
  margin: 22px 0 18px;
  opacity: .7;
}

.quote-author {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(.8rem, 1.1vw, 1.1rem);
  font-weight: 400;
  color: var(--gold);
  letter-spacing: .12em;
  text-transform: uppercase;
  outline: none;
  caret-color: var(--gold);
}

@media (orientation: portrait) {
  .quote-author { font-size: clamp(.8rem, 3.5vw, 1rem); }
  .divider { margin: 16px 0 14px; }
}

.quote-author:focus { outline: none; }

.edit-hint {
  position: absolute;
  font-size: 11px;
  color: var(--rule);
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 400;
  transition: color .3s;
}

.stage:hover .edit-hint { color: var(--muted); }

/* ── PANEL (timer side) ── */
.panel {
  display: flex;
  flex-direction: column;
  padding: 28px 24px;
  gap: 16px;
  background: var(--card-bg);
}

.panel-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--rule);
}

.panel-brand {
  font-size: 11px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.panel-date {
  font-size: 12px;
  color: var(--muted);
  text-align: right;
  line-height: 1.4;
}

.timer-block {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
}

.timer-display {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: .04em;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

.timer-label {
  font-size: 9px;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.timer-state {
  margin-top: 4px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--rule);
  transition: background .3s;
}

.timer-state.active {
  background: var(--gold);
  box-shadow: 0 0 0 4px rgba(184,149,90,.18);
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
}

.btn {
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink);
  border-radius: 6px;
  padding: 10px 0;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: border-color .2s, background .2s, color .2s, transform .15s;
}

.btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-1px);
}

.btn:active { transform: translateY(0); }

.btn.primary {
  border-color: var(--gold);
  color: var(--gold);
  grid-column: 1 / -1;
  padding: 12px 0;
  font-size: 12px;
}

.btn.primary:hover {
  background: var(--gold);
  color: var(--paper);
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 12px 14px;
}

.stat-card .s-label {
  font-size: 9px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 5px;
}

.stat-card .s-value {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: var(--ink);
  font-weight: 400;
  line-height: 1;
}

.stat-card.accent .s-value { color: var(--gold); }

.quote-btn {
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color .2s;
  margin-top: auto;
}

.quote-btn:hover { color: var(--gold); }

.quote-btn svg {
  width: 13px; height: 13px;
  stroke: currentColor;
  stroke-width: 1.8;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.fs-btn {
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  color: var(--muted);
  transition: color .2s;
}

.fs-btn:hover { color: var(--gold); }
.fs-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.quote-wrap { animation: fadeSlide .6s ease both; }
</style>
</head>
<body>

<div class="grain"></div>

<div class="layout">

  <!-- QUOTE STAGE -->
  <section class="stage">
    <span class="label-top">Today's Reflection</span>
    <div class="open-mark">"</div>
    <div class="quote-wrap">
      <div id="quote" class="quote-text" contenteditable="true" spellcheck="false">Everything you've ever wanted is on the other side of fear.</div>
      <div class="divider"></div>
      <div id="author" class="quote-author" contenteditable="true" spellcheck="false">George Addair</div>
    </div>
    <span class="edit-hint">Click to edit</span>
  </section>

  <!-- PANEL -->
  <aside class="panel">

    <div class="panel-top">
      <span class="panel-brand">Focus</span>
      <div class="panel-date" id="dateDisplay"></div>
      <button class="fs-btn" onclick="toggleFS()" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>

    <div class="timer-block">
      <div id="timerDisplay" class="timer-display">00:00:00</div>
      <div class="timer-label">Session</div>
      <div id="timerDot" class="timer-state"></div>
    </div>

    <div class="controls">
      <button class="btn primary" onclick="toggleTimer()" id="startBtn">Start Session</button>
      <button class="btn" onclick="resetTimer()">Reset</button>
      <button class="btn" onclick="newQuote()">New Quote</button>
    </div>

    <div class="stats-row">
      <div class="stat-card accent">
        <div class="s-label">Today</div>
        <div class="s-value" id="focusMins">0<span style="font-size:.85rem;color:var(--muted);margin-left:2px">m</span></div>
      </div>
      <div class="stat-card">
        <div class="s-label">Sessions</div>
        <div class="s-value" id="sessionCount">0</div>
      </div>
    </div>

    <button class="quote-btn" onclick="newQuote()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
      Refresh inspiration
    </button>

  </aside>
</div>

<script>
const QUOTES = [
  { text:"Everything you've ever wanted is on the other side of fear.", author:"George Addair" },
  { text:"The secret of getting ahead is getting started.", author:"Mark Twain" },
  { text:"It always seems impossible until it's done.", author:"Nelson Mandela" },
  { text:"You don't have to be great to start, but you have to start to be great.", author:"Zig Ziglar" },
  { text:"The way to get started is to quit talking and begin doing.", author:"Walt Disney" },
  { text:"Don't watch the clock; do what it does. Keep going.", author:"Sam Levenson" },
  { text:"Believe you can and you're halfway there.", author:"Theodore Roosevelt" },
  { text:"Act as if what you do makes a difference. It does.", author:"William James" },
  { text:"Success is not final, failure is not fatal: it is the courage to continue that counts.", author:"Winston Churchill" },
  { text:"Hard work beats talent when talent doesn't work hard.", author:"Tim Notke" },
  { text:"Focus on being productive instead of busy.", author:"Tim Ferriss" },
  { text:"Do the hard jobs first. The easy jobs will take care of themselves.", author:"Dale Carnegie" },
];

const quoteEl  = document.getElementById("quote");
const authorEl = document.getElementById("author");

quoteEl.innerText  = localStorage.getItem("quote")  || quoteEl.innerText.trim();
authorEl.innerText = localStorage.getItem("author") || authorEl.innerText.trim();

quoteEl.addEventListener("input",  () => localStorage.setItem("quote",  quoteEl.innerText));
authorEl.addEventListener("input", () => localStorage.setItem("author", authorEl.innerText));

function animateQuote() {
  const w = document.querySelector('.quote-wrap');
  w.style.animation = 'none';
  w.offsetHeight;
  w.style.animation = 'fadeSlide .5s ease both';
}

let qIdx = 0;
function newQuote() {
  qIdx = (qIdx + 1) % QUOTES.length;
  const q = QUOTES[qIdx];
  quoteEl.innerText  = q.text;
  authorEl.innerText = q.author;
  localStorage.setItem("quote",  q.text);
  localStorage.setItem("author", q.author);
  animateQuote();
}

/* TIMER */
let running  = localStorage.getItem("running") === "true";
let elapsed  = parseInt(localStorage.getItem("elapsed")  || 0);
let sessions = parseInt(localStorage.getItem("sessions") || 0);
let startTime = Date.now() - elapsed;

function fmt(ms) {
  let t = Math.floor(ms / 1000);
  let h = Math.floor(t / 3600);
  let m = Math.floor((t % 3600) / 60);
  let s = t % 60;
  return [h,m,s].map(n => String(n).padStart(2,"0")).join(":");
}

function render() {
  if (running) { elapsed = Date.now() - startTime; localStorage.setItem("elapsed", elapsed); }
  document.getElementById("timerDisplay").innerText = fmt(elapsed);
  document.getElementById("focusMins").innerHTML =
    Math.floor(elapsed/60000) + '<span style="font-size:.85rem;color:var(--muted);margin-left:2px">m</span>';
  document.getElementById("sessionCount").innerText = sessions;
  document.getElementById("timerDot").className = "timer-state" + (running ? " active" : "");
  document.getElementById("startBtn").innerText = running ? "Pause" : (elapsed > 0 ? "Resume" : "Start Session");
}

setInterval(render, 500);

function toggleTimer() {
  running = !running;
  if (running) {
    startTime = Date.now() - elapsed;
    if (elapsed === 0) { sessions++; localStorage.setItem("sessions", sessions); }
  }
  localStorage.setItem("running", running);
  render();
}

function resetTimer() {
  running = false; elapsed = 0;
  localStorage.setItem("elapsed", 0);
  localStorage.setItem("running", false);
  render();
}

if (running) startTime = Date.now() - elapsed;
render();

/* DATE */
function updateDate() {
  const now = new Date();
  const d = now.toLocaleDateString(undefined, { weekday:"short", day:"numeric", month:"short" });
  const t = now.toLocaleTimeString(undefined, { hour:"2-digit", minute:"2-digit" });
  document.getElementById("dateDisplay").innerHTML =
    `<span style="color:var(--muted);display:block">${d}</span>` +
    `<span style="font-size:14px;color:var(--ink)">${t}</span>`;
}
updateDate();
setInterval(updateDate, 30000);

/* FULLSCREEN */
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.code === "Space" && document.activeElement === document.body) {
    e.preventDefault(); toggleTimer();
  }
});

/* WAKE LOCK */
(async () => {
  try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch(_) {}
})();
</script>
</body>
</html>
